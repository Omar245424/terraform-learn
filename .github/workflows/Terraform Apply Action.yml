            - name: AWS Terraform Action
  # You may pin to the exact commit or the version.
  # uses: CloudNinjaDev/aws-terraform-action@f6eeb9bff662573d6d6686734d14b84465126751
  uses: CloudNinjaDev/aws-terraform-action@v2.0.2
  with:
    # Terraform version to install (e.g. "1.7.0" or "latest").
    terraform_version: # optional, default is latest
    # TFLint version to install (e.g. "v0.50.0" or "latest").
    tflint_version: # optional, default is latest
    # terraform-docs version to install (e.g. "v0.17.0" or "latest").
    terraform_docs_version: # optional, default is latest
    # Directory that contains the Terraform root module.
    working_directory: # optional, default is .
    # Run `terraform fmt -check` to enforce formatting.
    run_fmt: # optional, default is true
    # Run `terraform validate` against the configuration.
    run_validate: # optional, default is true
    # Run TFLint for additional linting rules.
    run_lint: # optional, default is true
    # Generate / verify Terraform module documentation with terraform-docs.
    run_docs: # optional, default is false
    # When run_docs=true, push the generated README.md back to the branch.
Set to "false" to only verify docs are current (CI mode).

    docs_push: # optional, default is false
    # Run Checkov security and compliance scan (soft-fail).
    run_security_scan: # optional, default is true
    # Run `terraform plan`.
    run_plan: # optional, default is false
    # Run `terraform apply`.
    run_apply: # optional, default is false
    # Pass `-auto-approve` to `terraform apply`.
    auto_approve: # optional, default is false
    # AWS region (required when any AWS operations are performed).
    aws_region: # optional, default is us-east-1
    # AWS Access Key ID (leave empty when using OIDC).
    aws_access_key_id: # optional, default is 
    # AWS Secret Access Key (leave empty when using OIDC).
    aws_secret_access_key: # optional, default is 
    # AWS Session Token for temporary credentials.
    aws_session_token: # optional, default is 
    # ARN of the IAM role to assume via OIDC.
    role_to_assume: # optional, default is 
    # Comma-separated list of backend config values (e.g. "bucket=my-bucket,key=tfstate").
    backend_config: # optional, default is 
    # Path to a tfvars file passed to plan / apply.
    var_file: # optional, default is 
    # Additional arguments appended to terraform plan / apply commands.
    extra_args: # optional, default is 
    # Cache Terraform providers and TFLint plugins to speed up subsequent runs.
    cache_plugins: # optional, default is true
    # Post a summary comment on the pull request when triggered by a PR event.
    comment_on_pr: # optional, default is true
    # GitHub token used to post PR comments. Pass secrets.GITHUB_TOKEN or github.token from your workflow.
    github_token: # optional, default is 
          
